name: Documentation

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yml"
      - "docs/hearth/**"
      - "docs/**"
      - "examples/README.md"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "Makefile"
      - "ROADMAP.md"
      - "SECURITY.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yml"
      - "docs/hearth/**"
      - "docs/**"
      - "examples/README.md"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "Makefile"
      - "ROADMAP.md"
      - "SECURITY.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/hearth/package-lock.json

      - name: Test documentation
        run: make test-docs

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/hearth/build

  deploy:
    name: Deploy documentation
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
