image:
  registry: ghcr.io/hearth-project
  operator: hearth
  gateway: hearth-gateway
  tag: ""
  pullPolicy: IfNotPresent

operator:
  replicas: 1
  leaderElect: false
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 10m
      memory: 128Mi

gateway:
  # external-push requires exactly one gateway replica. metrics-api remains the
  # compatibility default and permits more replicas with less precise activation.
  replicas: 1
  scalerMode: metrics-api

serviceAccount:
  create: true
  name: ""

nameOverride: ""
