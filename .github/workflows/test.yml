name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "CNAME"
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    permissions:
      contents: read
    name: Unit and controller tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Clone the code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Validate Helm chart
        run: |
          helm lint charts/hearth
          helm template hearth charts/hearth --namespace hearth-system >/dev/null
          helm template hearth charts/hearth --namespace hearth-system \
            --set serviceAccount.create=false \
            --set operator.leaderElect=true >/dev/null

      - name: Running Tests
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
          make test
          make helm-crds
          git diff --exit-code
