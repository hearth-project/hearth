name: Scale-to-Zero E2E

on:
  push:
  pull_request:

permissions: {}

env:
  KEDA_VERSION: 2.20.1
  KIND_VERSION: v0.32.0

jobs:
  test-scale-e2e:
    permissions:
      contents: read
    name: No-GPU scale-to-zero loop
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Install kind
        run: |
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-$(go env GOARCH)"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create kind cluster
        run: kind create cluster --name kind --wait 120s

      - name: Install KEDA
        run: |
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo update kedacore
          helm install keda kedacore/keda --version "${KEDA_VERSION}" \
            -n keda --create-namespace --wait --timeout 5m

      - name: Run the scale-to-zero e2e
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
          make test-scale-e2e
