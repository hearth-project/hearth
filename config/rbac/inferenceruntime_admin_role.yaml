apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: hearth
    app.kubernetes.io/managed-by: kustomize
  name: inferenceruntime-admin-role
rules:
- apiGroups:
  - serving.hearth.dev
  resources:
  - inferenceruntimes
  verbs:
  - '*'
- apiGroups:
  - serving.hearth.dev
  resources:
  - inferenceruntimes/status
  verbs:
  - get
