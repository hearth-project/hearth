{{- $scalerMode := .Values.gateway.scalerMode -}}
{{- if not (has $scalerMode (list "metrics-api" "external-push")) -}}
{{- fail "gateway.scalerMode must be metrics-api or external-push" -}}
{{- end -}}
{{- if and (eq $scalerMode "external-push") (ne (int .Values.gateway.replicas) 1) -}}
{{- fail "gateway.replicas must be 1 when gateway.scalerMode is external-push" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hearth.fullname" . }}-controller-manager
  namespace: {{ .Release.Namespace }}
  labels: {{- include "hearth.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels: {{- include "hearth.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "hearth.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "hearth.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: {{ include "hearth.operatorImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect={{ .Values.operator.leaderElect }}
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=0
            - --gateway-image={{ include "hearth.gatewayImage" . }}
            - --gateway-replicas={{ .Values.gateway.replicas }}
            - --scaler-mode={{ $scalerMode }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources: {{- toYaml .Values.operator.resources | nindent 12 }}
      terminationGracePeriodSeconds: 10
