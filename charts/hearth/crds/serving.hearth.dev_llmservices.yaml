---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: llmservices.serving.hearth.dev
spec:
  group: serving.hearth.dev
  names:
    kind: LLMService
    listKind: LLMServiceList
    plural: llmservices
    singular: llmservice
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.resolvedRuntime
      name: Runtime
      type: string
    - jsonPath: .status.replicas
      name: Replicas
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: LLMService is the Schema for the llmservices API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              LLMServiceSpec is the declarative, one-click description of a served model:
              what to run, on which backend, how to scale (including to zero), and how to cache.
            properties:
              cache:
                description: |-
                  CacheSpec selects how model weights are cached so cold pods load from local disk
                  instead of re-downloading on every scale-from-zero.
                properties:
                  prewarm:
                    description: prewarm hydrates weights into the cache before first
                      traffic.
                    type: boolean
                  size:
                    anyOf:
                    - type: integer
                    - type: string
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  storageClassName:
                    description: |-
                      storageClassName pins the cache PVC to a StorageClass; empty uses the cluster
                      default. Set this on clusters without a default StorageClass (common on managed
                      or domestic clusters) or to target a specific disk type.
                    type: string
                  strategy:
                    default: NodeLocalPVC
                    enum:
                    - NodeLocalPVC
                    - HostPath
                    - SharedPVC
                    - BakedImage
                    - None
                    type: string
                type: object
              endpoint:
                properties:
                  coldStart:
                    properties:
                      heartbeatInterval:
                        default: 10s
                        type: string
                      mode:
                        default: keepalive
                        description: |-
                          mode is how cold requests are handled: keepalive (SSE heartbeats hold the
                          connection) or reject (fast 503 + Retry-After for the client to retry).
                        enum:
                        - keepalive
                        - reject
                        type: string
                    type: object
                  openAICompatible:
                    default: true
                    description: |-
                      openAICompatible is informational in v0: the gateway always serves the
                      OpenAI-compatible API. Reserved for future protocol selection.
                    type: boolean
                type: object
              imagePullSecrets:
                description: |-
                  imagePullSecrets are applied to the backend, gateway, and prewarm pods so images
                  from private/air-gapped registries can be pulled. The secrets must exist in the
                  LLMService's namespace.
                items:
                  description: |-
                    LocalObjectReference contains enough information to let you locate the
                    referenced object inside the same namespace.
                  properties:
                    name:
                      default: ""
                      description: |-
                        Name of the referent.
                        This field is effectively required, but due to backwards compatibility is
                        allowed to be empty. Instances of this type with an empty value here are
                        almost certainly wrong.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                      type: string
                  type: object
                  x-kubernetes-map-type: atomic
                type: array
              model:
                properties:
                  catalogRef:
                    description: |-
                      catalogRef points to an external model catalog entry. Catalog resolution
                      is currently not implemented in v0; use model.source.uri for now.
                    type: string
                  source:
                    properties:
                      secretRef:
                        description: |-
                          secretRef holds credentials for private sources (e.g. a ModelScope token).
                          Not supported in v0: setting it fails reconcile until private sources land.
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                      uri:
                        description: |-
                          uri is the model location. Supported in v0: hf://, modelscope://, and
                          pvc://<claim>[/<subpath>] (pre-staged weights on an existing PVC, mounted
                          read-only). oci:// and s3:// are not yet implemented.
                        type: string
                    required:
                    - uri
                    type: object
                type: object
              resources:
                description: |-
                  ResourceSpec is the abstract accelerator request; it maps onto the runtime's
                  accelerator definition at reconcile time.
                properties:
                  accelerators:
                    default: 1
                    format: int32
                    type: integer
                  cpu:
                    anyOf:
                    - type: integer
                    - type: string
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  fraction:
                    description: |-
                      fraction requests a sub-device slice; valid only when the runtime supports sharing.
                      Not supported in v0 (no runtime supports sharing yet): setting it fails reconcile.
                    properties:
                      cores:
                        format: int32
                        type: integer
                      memory:
                        anyOf:
                        - type: integer
                        - type: string
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                    type: object
                  memory:
                    anyOf:
                    - type: integer
                    - type: string
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                type: object
              runtime:
                description: runtime selects the backend — pinned by name or auto-picked
                  by vendor preference.
                properties:
                  argsOverride:
                    description: argsOverride appends to / overrides the runtime's
                      serving args.
                    items:
                      type: string
                    type: array
                  name:
                    type: string
                  selector:
                    description: selector auto-picks among runtimes by vendor preference
                      order.
                    properties:
                      vendor:
                        description: vendor lists acceptable vendors in preference
                          order.
                        items:
                          type: string
                        type: array
                    type: object
                type: object
              scaling:
                description: |-
                  ScalingSpec configures KEDA-driven autoscaling. Scaling is intentionally limited
                  to LLM-aware signals: CPU and raw RPS are not supported.
                properties:
                  activationTimeout:
                    default: 5m
                    description: activationTimeout is how long the gateway buffers
                      a request during cold start.
                    type: string
                  drainTimeout:
                    default: 2m
                    description: drainTimeout must be <= the runtime's terminationGracePeriodSeconds.
                    type: string
                  max:
                    default: 1
                    format: int32
                    type: integer
                  metric:
                    default: queueDepth
                    description: |-
                      metric selects the scaling signal. Only queueDepth is wired to the autoscaler
                      in v0; kvCacheUtil is reserved and fails reconcile if selected.
                    enum:
                    - queueDepth
                    - kvCacheUtil
                    type: string
                  min:
                    default: 0
                    description: min replicas; 0 enables scale-to-zero.
                    format: int32
                    type: integer
                  scaleDownStabilization:
                    default: 5m
                    type: string
                  target:
                    default: 10
                    description: target is the desired metric value per replica.
                    format: int32
                    type: integer
                type: object
            required:
            - model
            type: object
          status:
            description: LLMServiceStatus defines the observed state of LLMService.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              endpointURL:
                description: endpointURL is the OpenAI-compatible base URL clients
                  should call.
                type: string
              phase:
                enum:
                - Pending
                - Loading
                - Ready
                - ScaledToZero
                - Degraded
                type: string
              replicas:
                format: int32
                type: integer
              resolvedRuntime:
                description: resolvedRuntime is the InferenceRuntime actually selected.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
