# Auto-merge PRs carrying the `lgtm` label. The `hold` label blocks merging.
# Runs when a label changes and on a short schedule to catch PRs whose checks
# turned green after the last label event.
name: prow-automerge

on:
  pull_request:
    types: [labeled]
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: jpmcb/prow-github-actions@v2.0.0
        with:
          jobs: lgtm
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          merge-method: squash
