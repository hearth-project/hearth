apiVersion: serving.hearth.dev/v1alpha1
kind: LLMService
metadata:
  labels:
    app.kubernetes.io/name: hearth
    app.kubernetes.io/managed-by: kustomize
  name: qwen-910b-validation
spec:
  model:
    source:
      uri: modelscope://Qwen/Qwen2.5-0.5B-Instruct
  runtime:
    name: vllm-ascend
    argsOverride:
      - --max-model-len=2048
      - --enforce-eager
  resources:
    accelerators: 1
    cpu: "4"
    memory: 24Gi
  scaling:
    min: 0
    # Raise this only when the cluster advertises more than one free Ascend910 resource.
    max: 1
    metric: queueDepth
    target: 1
    activationTimeout: 10m
    scaleDownStabilization: 5m
    # A 15-second drain aborted a live vLLM-Ascend stream; 60 seconds passed on 910B3.
    drainTimeout: 60s
  cache:
    strategy: NodeLocalPVC
    size: 20Gi
    prewarm: true
  endpoint:
    openAICompatible: true
    coldStart:
      mode: keepalive
      heartbeatInterval: 5s
