name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build & push operator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hearth:${{ steps.v.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/hearth:latest
      - name: Build & push gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gateway
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hearth-gateway:${{ steps.v.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/hearth-gateway:latest

  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Package chart at the release version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm package charts/hearth --version "$VERSION" --app-version "$VERSION"
      - name: Build release notes (curated highlights + contributor thanks)
        run: |
          bash hack/extract-changelog.sh "${GITHUB_REF_NAME}" > release-body.md || true
          if [ ! -s release-body.md ]; then
            echo "See [CHANGELOG.md](CHANGELOG.md) for details." > release-body.md
          fi
          {
            echo
            echo "---"
            echo
            echo "🙏 **Thanks to everyone who contributed to this release** — the merged PRs and first-time"
            echo "contributors are credited under **What's Changed** and **New Contributors** below."
          } >> release-body.md
      - name: Attach chart to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body_path: release-body.md
          files: hearth-*.tgz
