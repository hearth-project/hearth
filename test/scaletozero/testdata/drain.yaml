apiVersion: serving.hearth.dev/v1alpha1
kind: InferenceRuntime
metadata:
  name: vllm-stub-drain
spec:
  family: vllm
  vendor: nvidia
  priority: 100
  container:
    image: hearth.dev/vllm-stub:e2e
    args: ["--model={{ .Model.Path }}"]
    env:
      - name: STUB_STARTUP_DELAY
        value: "5s"
      - name: STUB_TOKEN_DELAY
        value: "150ms"
    port:
      name: http
      containerPort: 8000
  accelerator:
    resourceName: hearth.dev/fake-gpu
    sharing:
      supported: false
  health:
    readiness:
      httpGet: { path: /health, port: http }
    startup:
      httpGet: { path: /health, port: http }
      periodSeconds: 2
      failureThreshold: 30
  lifecycle:
    # Wide grace so a deliberately long in-flight stream finishes before SIGTERM.
    terminationGracePeriodSeconds: 90
    preStopDrain: true
---
apiVersion: serving.hearth.dev/v1alpha1
kind: LLMService
metadata:
  name: stub-drain
  namespace: hearth-e2e
spec:
  model:
    source:
      uri: hf://hearth/stub-model
  runtime:
    name: vllm-stub-drain
  resources:
    accelerators: 1
    cpu: "100m"
    memory: 128Mi
  scaling:
    min: 0
    max: 1
    metric: queueDepth
    target: 1
    activationTimeout: 2m
    scaleDownStabilization: 15s
    drainTimeout: 60s
  endpoint:
    openAICompatible: true
    coldStart:
      mode: keepalive
      heartbeatInterval: 2s
