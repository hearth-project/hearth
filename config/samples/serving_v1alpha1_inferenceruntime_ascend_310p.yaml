apiVersion: serving.hearth.dev/v1alpha1
kind: InferenceRuntime
metadata:
  labels:
    app.kubernetes.io/name: hearth
    app.kubernetes.io/managed-by: kustomize
  name: vllm-ascend-310p
# v0: golden-tested; validating on real 310P NPUs is tracked separately.
spec:
  family: vllm
  vendor: ascend
  # Lower than the 910 runtime (100) so vendor-selector auto-pick still prefers 910 when both exist.
  priority: 90
  container:
    image: quay.io/ascend/vllm-ascend:v0.10.0rc1-310p
    args:
      - --model={{ .Model.Path }}
      - --served-model-name={{ .Service.Name }}
      - --port=8000
      # 310P does not support bf16 well; pin fp16 to avoid load-time crashes / garbage output.
      - --dtype=float16
    port:
      name: http
      containerPort: 8000
  accelerator:
    # 310P device plugin advertises huawei.com/Ascend310P — confirm via `kubectl describe node`.
    resourceName: huawei.com/Ascend310P
    sharing:
      supported: false
    nodeSelector:
      accelerator: ascend-310p
  health:
    readiness:
      httpGet:
        path: /health
        port: http
    liveness:
      httpGet:
        path: /health
        port: http
      failureThreshold: 6
    startup:
      httpGet:
        path: /health
        port: http
      periodSeconds: 10
      failureThreshold: 180
  lifecycle:
    terminationGracePeriodSeconds: 120
    preStopDrain: true
  metrics:
    path: /metrics
    port: http
    queueDepth: vllm:num_requests_waiting
    kvCacheUtil: vllm:gpu_cache_usage_perc
    running: vllm:num_requests_running
    ttft: vllm:time_to_first_token_seconds
