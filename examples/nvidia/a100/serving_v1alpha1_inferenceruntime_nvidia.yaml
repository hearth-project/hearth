apiVersion: serving.hearth.dev/v1alpha1
kind: InferenceRuntime
# Hardware-validated on NVIDIA A100. The standard nvidia.com/gpu resource keeps
# the runtime usable on other vLLM-compatible NVIDIA devices.
metadata:
  labels:
    app.kubernetes.io/name: hearth
    app.kubernetes.io/managed-by: kustomize
  name: vllm-nvidia
spec:
  family: vllm
  vendor: nvidia
  priority: 100
  container:
    image: vllm/vllm-openai:v0.22.0
    args:
      - --model={{ .Model.Path }}
      - --served-model-name={{ .Service.Name }}
      - --port=8000
    port:
      name: http
      containerPort: 8000
  accelerator:
    resourceName: nvidia.com/gpu
    sharing:
      supported: false
  health:
    readiness:
      httpGet:
        path: /health
        port: http
    liveness:
      httpGet:
        path: /health
        port: http
      failureThreshold: 6
    startup:
      httpGet:
        path: /health
        port: http
      periodSeconds: 10
      failureThreshold: 120
  lifecycle:
    terminationGracePeriodSeconds: 120
    preStopDrain: true
  metrics:
    path: /metrics
    port: http
    queueDepth: vllm:num_requests_waiting
    kvCacheUtil: vllm:gpu_cache_usage_perc
    running: vllm:num_requests_running
    ttft: vllm:time_to_first_token_seconds
