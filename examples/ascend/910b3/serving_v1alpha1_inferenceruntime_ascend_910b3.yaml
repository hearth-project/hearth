apiVersion: serving.hearth.dev/v1alpha1
kind: InferenceRuntime
metadata:
  labels:
    app.kubernetes.io/name: hearth
    app.kubernetes.io/managed-by: kustomize
  name: vllm-ascend
# Ascend 910B3 (Atlas A2). This profile is hardware-validated with CANN 9.0.0
# and driver 26.0.rc1. For A3 use the -a3 tag; for 310P use a dedicated -310p profile.
spec:
  family: vllm
  vendor: ascend
  priority: 100
  container:
    image: quay.io/ascend/vllm-ascend:v0.21.0rc1
    args:
      # The image entrypoint delegates to argv, so include the executable and subcommand.
      - vllm
      - serve
      - "{{ .Model.Path }}"
      - --served-model-name={{ .Service.Name }}
      - --port=8000
    port:
      name: http
      containerPort: 8000
  accelerator:
    # device visibility is set by the Ascend device plugin; Hearth only requests the resource
    resourceName: huawei.com/Ascend910
    sharing:
      supported: false
    nodeSelector:
      # Matches the selector in MindCluster's standard Ascend 910 device-plugin manifest.
      accelerator: huawei-Ascend910
  health:
    readiness:
      httpGet:
        path: /health
        port: http
    liveness:
      httpGet:
        path: /health
        port: http
      failureThreshold: 6
    startup:
      httpGet:
        path: /health
        port: http
      periodSeconds: 10
      failureThreshold: 180
  lifecycle:
    terminationGracePeriodSeconds: 120
    preStopDrain: true
  metrics:
    path: /metrics
    port: http
    queueDepth: vllm:num_requests_waiting
    kvCacheUtil: vllm:gpu_cache_usage_perc
    running: vllm:num_requests_running
    ttft: vllm:time_to_first_token_seconds
