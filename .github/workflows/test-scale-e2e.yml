name: Scale-to-Zero E2E

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "CNAME"
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  KEDA_VERSION: 2.20.1
  KIND_VERSION: v0.32.0

jobs:
  test-scale-e2e:
    permissions:
      contents: read
    name: No-GPU scale-to-zero loop (${{ matrix.scaler-mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        scaler-mode: [metrics-api, external-push]
    steps:
      - name: Clone the code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Install kind
        run: |
          ARCH="$(go env GOARCH)"
          URL="https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-${ARCH}"
          curl --fail --show-error --location --output kind "${URL}"
          curl --fail --show-error --location --output kind.sha256sum "${URL}.sha256sum"
          echo "$(cut -d ' ' -f 1 kind.sha256sum)  kind" | sha256sum --check -
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create kind cluster
        run: kind create cluster --name kind --wait 120s

      - name: Install KEDA
        run: |
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo update kedacore
          helm install keda kedacore/keda --version "${KEDA_VERSION}" \
            -n keda --create-namespace --wait --timeout 5m

      - name: Run the scale-to-zero e2e
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
          make test-scale-e2e SCALE_SCALER_MODE=${{ matrix.scaler-mode }}
