# This rule is not used by the project hearth itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the serving.hearth.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: hearth
    app.kubernetes.io/managed-by: kustomize
  name: llmservice-editor-role
rules:
- apiGroups:
  - serving.hearth.dev
  resources:
  - llmservices
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - serving.hearth.dev
  resources:
  - llmservices/status
  verbs:
  - get
