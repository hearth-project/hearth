apiVersion: serving.hearth.dev/v1alpha1
kind: InferenceRuntime
metadata:
  labels:
    app.kubernetes.io/name: hearth
    app.kubernetes.io/managed-by: kustomize
  name: vllm-ascend-310p-pro
# Atlas 300I Pro profile. Physical validation is still required because vLLM-Ascend
# does not explicitly list this product.
spec:
  family: vllm
  vendor: ascend
  priority: 100
  container:
    image: quay.io/ascend/vllm-ascend:v0.22.1rc1-310p
    args:
      # The 310P image entrypoint delegates to argv, so include the executable and subcommand.
      - vllm
      - serve
      - "{{ .Model.Path }}"
      - --served-model-name={{ .Service.Name }}
      - --port=8000
    port:
      name: http
      containerPort: 8000
  accelerator:
    resourceName: huawei.com/Ascend310P
    sharing:
      supported: false
    nodeSelector:
      accelerator: huawei-Ascend310P
      serving.hearth.dev/ascend-product: atlas-300i-pro
  health:
    readiness:
      httpGet:
        path: /health
        port: http
    liveness:
      httpGet:
        path: /health
        port: http
      failureThreshold: 6
    startup:
      httpGet:
        path: /health
        port: http
      periodSeconds: 10
      failureThreshold: 180
  lifecycle:
    terminationGracePeriodSeconds: 120
    preStopDrain: true
  metrics:
    path: /metrics
    port: http
    queueDepth: vllm:num_requests_waiting
    kvCacheUtil: vllm:gpu_cache_usage_perc
    running: vllm:num_requests_running
    ttft: vllm:time_to_first_token_seconds
