name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Validate tag and release metadata
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Tag ${GITHUB_REF_NAME} is not a supported semantic version" >&2
            exit 1
          fi

          CHART_VERSION="$(awk '$1 == "version:" {gsub(/"/, "", $2); print $2}' charts/hearth/Chart.yaml)"
          APP_VERSION="$(awk '$1 == "appVersion:" {gsub(/"/, "", $2); print $2}' charts/hearth/Chart.yaml)"
          if [[ "${CHART_VERSION}" != "${VERSION}" || "${APP_VERSION}" != "${VERSION}" ]]; then
            echo "Tag ${VERSION}, chart ${CHART_VERSION}, and app ${APP_VERSION} must match" >&2
            exit 1
          fi

          grep -Fq "## [${VERSION}]" CHANGELOG.md
          git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"
          helm lint charts/hearth
          helm template hearth charts/hearth --namespace hearth-system >/dev/null

  images:
    name: Publish container images
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        id: v
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          {
            echo "version=${VERSION}"
            echo "operator_tags<<EOF"
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/hearth:${VERSION}"
            if [[ "${VERSION}" != *-* ]]; then
              echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/hearth:latest"
            fi
            echo "EOF"
            echo "gateway_tags<<EOF"
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/hearth-gateway:${VERSION}"
            if [[ "${VERSION}" != *-* ]]; then
              echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/hearth-gateway:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push operator image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.v.outputs.version }}
          tags: ${{ steps.v.outputs.operator_tags }}
          cache-from: type=gha,scope=hearth-operator
          cache-to: type=gha,mode=max,scope=hearth-operator
          provenance: mode=max
          sbom: true

      - name: Build and push gateway image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.gateway
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.v.outputs.version }}
          tags: ${{ steps.v.outputs.gateway_tags }}
          cache-from: type=gha,scope=hearth-gateway
          cache-to: type=gha,mode=max,scope=hearth-gateway
          provenance: mode=max
          sbom: true

  chart:
    name: Publish Helm chart
    needs: [validate, images]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Package chart at the release version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm package charts/hearth --version "$VERSION" --app-version "$VERSION"

      - name: Build release notes (curated highlights + contributor thanks)
        run: |
          bash hack/extract-changelog.sh "${GITHUB_REF_NAME}" > release-body.md
          if [ ! -s release-body.md ]; then
            echo "CHANGELOG.md has no content for ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          {
            echo
            echo "---"
            echo
            echo "🙏 **Thanks to everyone who contributed to this release** — the merged PRs and first-time"
            echo "contributors are credited under **What's Changed** and **New Contributors** below."
          } >> release-body.md

      - name: Generate chart checksum
        run: sha256sum hearth-*.tgz > checksums.txt

      - name: Attach chart to the GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body_path: release-body.md
          fail_on_unmatched_files: true
          files: |
            hearth-*.tgz
            checksums.txt
